name: Deploy static site to Azure Web App - AzureFrancoBeloqui360021GitHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4B05BE964E25458FB75037185A25A230 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_68E1234DBFD04F0B8724BFA96D563BBB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C3CCE187B0B142EBB536C43C3F316906 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "AzureFrancoBeloqui360021GitHub"
          slot-name: "Production"
          package: ./wwwroot
